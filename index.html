<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi cebollín 🤎</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Segoe UI, sans-serif;
 background:linear-gradient(180deg,#140010,#2a0030);
 color:#fff;
 overflow-x:hidden;
}

#login{
 position:fixed;
 inset:0;
 display:flex;
 justify-content:center;
 align-items:center;
 background:#0a0008;
 z-index:999;
 overflow:hidden;
}

.loginCard{
 background:rgba(255,255,255,.15);
 backdrop-filter:blur(14px);
 padding:40px;
 border-radius:25px;
 text-align:center;
 box-shadow:0 0 40px rgba(255,0,120,.4);
 animation:float 4s ease-in-out infinite;
 z-index:2;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

input{
 padding:14px;
 border-radius:14px;
 border:none;
 text-align:center;
 font-size:16px;
 width:200px;
 color: #000;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:20px;
 background:linear-gradient(45deg,#ff4da6,#ff80bf);
 color:white;
 font-size:16px;
 margin-top:12px;
 cursor:pointer;
 transition:.25s;
}

button:hover{
 transform:scale(1.08);
 box-shadow:0 0 12px #ff80bf;
}

.loginRain{
 position:absolute;
 top:-20px;
 animation:loginFall linear forwards;
 opacity:.6;
 z-index: 1;
}
@keyframes loginFall{
 to{ transform:translateY(110vh); opacity:.2; }
}

.bgHearts span{
 position:fixed;
 color:#ff4da6;
 animation:rise linear infinite;
 opacity:.25;
 pointer-events:none;
}
@keyframes rise{
 from{transform:translateY(100vh)}
 to{transform:translateY(-10vh)}
}

.card{
 background:#fff;
 color:#4a0030;
 margin:22px auto;
 padding:22px;
 width:95%;
 max-width:560px;
 border-radius:24px;
 box-shadow:0 12px 40px rgba(0,0,0,.25);
 border:3px solid #ffd6eb;
}

.circleImg,.musicCover{
 width:170px;
 height:170px;
 border-radius:50%;
 object-fit:cover;
 display:block;
 margin:14px auto;
 border:6px solid #ffb3d9;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:10px;
}
.grid img{
 width:100%;
 height:140px;
 object-fit:cover;
 border-radius:16px;
 cursor:pointer;
}

.carousel{
 display:flex;
 gap:14px;
 overflow:hidden;
}
.carousel img{
 width:180px;
 height:140px;
 object-fit:cover;
 border-radius:16px;
 animation:slide 30s linear infinite;
}
@keyframes slide{
 from{transform:translateX(0)}
 to{transform:translateX(-50%)}
}

#zoom{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.85);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:9999;
}
#zoom img{
 max-width:90%;
 max-height:90%;
 border-radius:18px;
}

.typewriter{
 white-space:pre-wrap;
 border-right:2px solid #ff4da6;
 animation:blink .8s infinite;
}
@keyframes blink{
50%{border-color:transparent}
}

.secretLetter{
 margin-top:15px;
 padding:20px;
 border-radius:18px;
 background:linear-gradient(45deg,#ffe0f0,#ffd1ea);
 display:none;
 white-space:pre-wrap;
}

.seal{
 font-size:42px;
 cursor:pointer;
 animation:pulse 1.5s infinite;
}
@keyframes pulse{
50%{transform:scale(1.15)}
}

.signature{
 font-family:cursive;
 font-size:22px;
 margin-top:15px;
 opacity:0;
}

.tapPhrase{
 position:fixed;
 color:#ffd6eb;
 font-size:18px;
 animation:floatUp 2s forwards;
 pointer-events:none;
}
@keyframes floatUp{
 to{ transform:translateY(-60px); opacity:0; }
}

@keyframes pulseCounter{
 from{transform:scale(1)}
 to{transform:scale(1.05)}
}
</style>
<style>
/* Estilos del Acuario de Jerry */
.aquarium{
 position:relative;
 width:100%;
 height:240px;
 background:linear-gradient(180deg, #0a4a6a 0%, #063a55 25%, #032a40 60%, #021a2a 100%);
 border-radius:25px;
 overflow:hidden;
 border:6px solid #1a9abf;
 box-shadow:inset 0 0 100px rgba(0,140,200,0.6), 0 0 50px rgba(0,180,240,0.4), inset 0 -30px 40px rgba(0,0,0,0.5);
 margin-top:15px;
}
.aquarium::before{
 content:''; position:absolute; top:-50px; left:5%; width:90%; height:140%;
 background:linear-gradient(180deg, rgba(255,200,100,0.2) 0%, rgba(255,180,80,0.1) 30%, transparent 70%);
 pointer-events:none; animation:goldenRays 15s ease-in-out infinite;
}
@keyframes goldenRays{
0%,100%{opacity:0.1; transform:scale(1) translateX(0) rotate(0deg);}
50%{opacity:0.15; transform:scale(1.05) translateX(-10px) rotate(-1deg);}
}
.aquarium::after{
 content:''; position:absolute; bottom:0; left:0; width:100%; height:60px;
 background:linear-gradient(180deg, transparent 0%, rgba(10,30,40,0.9) 100%); pointer-events:none; border-radius:0 0 18px 18px;
}
.aquarium-sand{
 position:absolute; bottom:0; left:0; width:100%; height:40px;
 background:linear-gradient(180deg, #d4b080 0%, #c9a060 30%, #a88040 70%, #8b6940 100%);
 border-radius:0 0 20px 20px; box-shadow:0 -8px 20px rgba(0,0,0,0.4), inset 0 5px 15px rgba(255,255,255,0.1);
}
.aquarium-sand::before{ content:'·······'; position:absolute; top:-14px; left:0; width:100%; font-size:16px; color:#b89060; text-align:center; letter-spacing:14px; opacity:0.5; }
.seaweed{ position:absolute; bottom:35px; font-size:44px; animation:sway 6s ease-in-out infinite; transform-origin:bottom center; filter:drop-shadow(0 0 10px rgba(60,200,120,0.5)) brightness(1.1); }
@keyframes sway{ 0%,100%{transform:rotate(-1deg);} 50%{transform:rotate(1deg);} }
.turtle-swim{ position:absolute; font-size:52px; animation:swimAround 22s linear infinite; filter:drop-shadow(0 0 20px rgba(140,240,255,0.8)); z-index:20; }
@keyframes swimAround{
0%{left:2%;top:15%;transform:rotate(10deg) scaleX(1);}
42%{left:75%;top:28%;transform:rotate(10deg) scaleX(-1);}
52%{left:72%;top:40%;transform:rotate(-20deg) scaleX(-1);}
100%{left:2%;top:15%;transform:rotate(10deg) scaleX(1);}
}
.aquarium-surface{ position:absolute; top:0; left:0; width:100%; height:30px; background:linear-gradient(180deg, rgba(200,240,255,0.7) 0%, transparent 100%); animation:waterWaves 6s ease-in-out infinite; z-index:25; }
@keyframes waterWaves{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-2px);} }
.small-fish{ position:absolute; font-size:22px; animation:fishSwim 30s linear infinite; opacity:0.9; z-index:15; }
@keyframes fishSwim{ 0%{left:-18%;transform:scaleX(1);} 50%{left:118%;transform:scaleX(-1);} 100%{left:-18%;transform:scaleX(1);} }
.starfish{ position:absolute; bottom:12px; left:30%; font-size:30px; animation:starBounce 8s ease-in-out infinite; z-index:18; }
@keyframes starBounce{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
.crab{ position:absolute; bottom:10px; left:70%; font-size:28px; animation:crabMove 12s ease-in-out infinite; z-index:18; }
@keyframes crabMove{ 0%,100%{transform:translateX(0);} 50%{transform:translateX(-15px);} }
.aqua-bubble{ position:absolute; background:radial-gradient(circle at 35% 35%, #fff, rgba(200,240,255,0.2)); border-radius:50%; animation:bubbleRise 6s linear infinite; }
@keyframes bubbleRise{ 0%{transform:translateY(0) scale(0.15); opacity:0;} 2%{opacity:0.95;} 100%{transform:translateY(-250px) scale(1.05); opacity:0;} }
.aqua-particle{ position:absolute; width:5px; height:5px; background:rgba(255,255,200,0.8); border-radius:50%; animation:particleFloat 10s ease-in-out infinite; }
@keyframes particleFloat{ 0%,100%{transform:translateY(0); opacity:0.2;} 50%{transform:translateY(-100px); opacity:0.8;} }
.rock{ position:absolute; bottom:30px; font-size:38px; z-index:12; }
.snail{ position:absolute; bottom:15px; left:50%; font-size:24px; animation:snailMove 15s ease-in-out infinite; z-index:17; }
@keyframes snailMove{ 0%,100%{transform:translateX(0);} 50%{transform:translateX(15px);} }
.jellyfish{ position:absolute; font-size:28px; animation:swimJelly 25s ease-in-out infinite; opacity:0.85; z-index:14; }
@keyframes swimJelly{ 0%,100%{left:80%;top:60%;} 50%{left:40%;top:45%;} }

/* Estilos Premium del Jardín de Canelito */
.garden-card { background: #fff; color: #4a0030; margin: 22px auto; padding: 22px; width: 95%; max-width: 560px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,.25); border: 3px solid #ffd6eb; text-align: center; }
.garden { position: relative; width: 100%; height: 260px; background: linear-gradient(180deg, #ffccd5 0%, #fff0f3 40%, #b7e4c7 41%, #74c69d 100%); border-radius: 25px; overflow: hidden; border: 6px solid #95d5b2; box-shadow: inset 0 0 40px rgba(116,198,157,0.4); margin-top: 15px; }
.canelito-container { position: absolute; bottom: 20px; left: 50px; width: 80px; height: 95px; z-index: 50; transition: left 0.1s linear; }
.canelito-shadow { position: absolute; bottom: 0; left: 10px; width: 60px; height: 10px; background: rgba(0, 0, 0, 0.25); border-radius: 50%; transition: transform 0.3s, opacity 0.3s; z-index: 49; }
.canelito-body { position: absolute; top: 0; left: 0; width: 80px; height: 80px; transform-origin: bottom center; }
.canelito-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
.anim-walk { animation: puppyWalkBounce 0.5s ease-in-out infinite alternate; }
@keyframes puppyWalkBounce { 0% { transform: translateY(0) rotate(-2deg); } 100% { transform: translateY(-16px) rotate(4deg); } }
.anim-sit { animation: puppySitPulse 1.5s ease-in-out infinite alternate; }
@keyframes puppySitPulse { 0% { transform: scaleY(0.9) scaleX(1.05) translateY(5px); } 100% { transform: scaleY(0.95) scaleX(1) translateY(2px); } }
.anim-zoomies { animation: puppyZoomies 0.25s ease-in-out infinite alternate; }
@keyframes puppyZoomies { 0% { transform: translateY(0) scaleY(0.95) rotate(-5deg); } 100% { transform: translateY(-22px) scaleY(1.05) rotate(7deg); } }
.trail-particle { position: absolute; font-size: 14px; pointer-events: none; z-index: 45; animation: particleFadeUp 1.2s ease-out forwards; }
@keyframes particleFadeUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-50px) translateX(var(--x-drift)) scale(1.3); opacity: 0; } }
.butterfly { position: absolute; font-size: 24px; z-index: 30; animation: flyAround 8s ease-in-out infinite alternate; }
@keyframes flyAround { 0% { transform: translate(0, 0); } 50% { transform: translate(120px, -30px) rotate(15deg); } 100% { transform: translate(240px, 10px) rotate(-10deg); } }
.toy-ball { position: absolute; bottom: 15px; font-size: 22px; z-index: 25; animation: ballBounce 2.5s ease-in-out infinite alternate; }
@keyframes ballBounce { 0% { bottom: 15px; transform: rotate(0deg); } 100% { bottom: 90px; transform: rotate(360deg); } }
.garden-cloud { position: absolute; top: 10px; font-size: 30px; opacity: 0.4; animation: cloudDrift 20s linear infinite; }
@keyframes cloudDrift { from { left: -20%; } to { left: 120%; } }
.garden-flower { position: absolute; bottom: 10px; font-size: 18px; transform-origin: bottom center; animation: flowerSway 3s ease-in-out infinite alternate; }
@keyframes flowerSway { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }
</style>
</head>

<script>
setInterval(()=>{
 const loginContainer = document.getElementById("login");
 if(loginContainer && loginContainer.style.display!=="none"){
  const h=document.createElement("div");
  h.className="loginRain";
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(3+Math.random()*3)+"s";
  loginContainer.appendChild(h);
  setTimeout(()=>h.remove(),6000);
 }
},300);

const audioBG = document.getElementById("bgMusic");
const audioSong = document.getElementById("ourSong");
const audioWrite = document.getElementById("writeSound");
let firstInteractionDone = false;

function enter(){
 const inputPass = document.getElementById("pass");
 const loginContainer = document.getElementById("login");
 if(inputPass && loginContainer){
  if(inputPass.value==="Jerry"){
   if(!firstInteractionDone){
    audioBG.play().catch(err => console.log("Audio de fondo bloqueado:", err));
    audioSong.load(); audioWrite.load();
    firstInteractionDone = true;
   }
   loginContainer.style.display="none";
  }
 }
}

function toggleSong(){
 if(audioSong.paused){
  audioBG.pause(); audioSong.currentTime=0; audioSong.play().catch(()=>{});
  document.getElementById("btnPlay").innerHTML="⏸️ Pausar";
 } else {
  audioSong.pause(); audioBG.play().catch(()=>{});
  document.getElementById("btnPlay").innerHTML="▶️ Reproducir";
 }
}

const frases=["Eres mi lugar favorito 🤎","Contigo todo es mejor 💞","Mi coincidencia más bonita ✨","Tu sonrisa es mi paz"];
document.addEventListener("click",e=>{
 if(e.target.tagName==="BUTTON"||e.target.tagName==="INPUT") return;
 if (!firstInteractionDone) { audioBG.play().catch(() => {}); firstInteractionDone = true; }
 const f=document.createElement("div"); f.className="tapPhrase";
 f.innerText=frases[Math.floor(Math.random()*frases.length)];
 f.style.left=e.clientX+"px"; f.style.top=e.clientY+"px";
 document.body.appendChild(f); setTimeout(()=>f.remove(),2000);
});

document.querySelectorAll("#gallery img").forEach(img=>{
 img.onclick=()=>{ zoom.style.display="flex"; zoomImg.src=img.src; }
});

const bgHeartsContainer = document.getElementById("bgHearts");
if(bgHeartsContainer){
 for(let i=0;i<25;i++){
  const s=document.createElement("span"); s.innerHTML="❤";
  s.style.left=Math.random()*100+"vw"; s.style.fontSize=(16+Math.random()*26)+"px";
  s.style.animationDuration=(8+Math.random()*10)+"s"; bgHeartsContainer.appendChild(s);
 }
}

const start = new Date(2024, 8, 11, 0, 0, 0);
function updateCounter(){
 const now = new Date(); const diff = now - start;
 const days = Math.floor(diff / (1000*60*60*24));
 const hours = Math.floor((diff / (1000*60*60)) % 24);
 const minutes = Math.floor((diff / (1000*60)) % 60);
 const seconds = Math.floor((diff / 1000) % 60);
 const counterEl = document.getElementById("counter");
 if(counterEl){
  counterEl.innerHTML = `<h3 style="margin:0;font-size:28px;animation:pulseCounter 1s infinite alternate;">${days} días 💗</h3>${hours} horas ${minutes} minutes ${seconds} segundos`;
 }
}
updateCounter(); setInterval(updateCounter,1000);

const poemaTexto="Cuando me enamoré de ti\n\n\"Cuando me enamoré de ti, entendí que no era que todas aquellas personas que me hablaron del amor estuvieran mal, sino que nunca me hablaron de ti.\n\nTe prometo\n\n\"Si te apagas, te prometo amarte con más fuerza.\nPrometo devolverte la luz que te caracteriza,\nregar tu jardín con el amor que me brindaste cuando estaba marchito.\nTe prometo cuidarte cuando enfermes\ny hacer lo que haga falta para asegurarme de que vuelvas a florecer.\n\nPorque, mi amor, si hay algo que le pido a Dios es que,\nsi alguna vez llega a ser necesario,\nme permita ser aquello que te haga falta,\ncomo tú lo fuiste conmigo.\"";

function typeText(t, el){
 el.textContent=""; const chars=[...t]; let i=0;
 function w(){ if(i<chars.length){ el.textContent+=chars[i++]; setTimeout(w,28); } }
 w();
}
const poemaEl = document.getElementById("poema");
if(poemaEl) { setTimeout(()=>typeText(poemaTexto,poemaEl),1200); }

function openLetter(){
 audioWrite.play().catch(()=>{});
 const txt="Esta carta es para ti.\nTe amo mi cebollín 🤎\nEspero compartir más cosas juntos 🥰🧸";
 const letterEl = document.getElementById("letter"); const signEl = document.getElementById("sign");
 if(letterEl && signEl){ letterEl.style.display="block"; typeText(txt,letterEl); setTimeout(()=>signEl.style.opacity=1,4200); }
}

function createAquariumEffects(){
 const aquarium = document.getElementById("aquarium"); if(!aquarium) return;
 setInterval(()=>{
  const bubble = document.createElement("div"); bubble.className = "aqua-bubble";
  const size = 4 + Math.random() * 14; bubble.style.width = size + "px"; bubble.style.height = size + "px";
  bubble.style.left = (Math.random() * 94 + 3) + "%"; bubble.style.bottom = "40px";
  bubble.style.animationDuration = (5 + Math.random() * 5) + "s"; aquarium.appendChild(bubble);
  setTimeout(()=>{ if(bubble.parentNode) bubble.remove(); }, 10000);
 }, 600);
 setInterval(()=>{
  const particle = document.createElement("div"); particle.className = "aqua-particle";
  particle.style.left = (Math.random() * 96 + 2) + "%"; particle.style.bottom = (Math.random() * 180 + 50) + "px";
  particle.style.animationDuration = (8 + Math.random() * 6) + "s"; aquarium.appendChild(particle);
  setTimeout(()=>{ if(particle.parentNode) particle.remove(); }, 15000);
 }, 1500);
}
setTimeout(createAquariumEffects, 700);

// Cerebro Autónomo de Canelito Premium
function initCanelitoBrain() {
  const container = document.getElementById("canelitoObj"); const body = document.getElementById("canelitoBody");
  const shadow = document.getElementById("canelitoShadow"); const garden = document.getElementById("canelitoGarden");
  if (!container || !body || !shadow || !garden) return;
  let posX = 50; let direction = 1; let currentStatus = "walk"; let speed = 1.8;

  setInterval(() => {
    const randomDice = Math.random();
    if (randomDice < 0.50) {
      currentStatus = "walk"; speed = 1.6 + Math.random() * 0.8; body.className = "canelito-body anim-walk";
    } else if (randomDice < 0.80) {
      currentStatus = "sit"; speed = 0; body.className = "canelito-body anim-sit";
    } else {
      currentStatus = "zoomies"; speed = 4.2; body.className = "canelito-body anim-zoomies";
    }
  }, 4000);

  function updatePhysics() {
    const gardenWidth = garden.clientWidth - 90;
    if (currentStatus !== "sit") {
      posX += speed * direction;
      if (posX >= gardenWidth) { posX = gardenWidth; direction = -1; }
      else if (posX <= 10) { posX = 10; direction = 1; }
      container.style.left = posX + "px"; container.style.transform = direction === 1 ? "scaleX(1)" : "scaleX(-1)";
    } else { container.style.transform = "scaleX(1)"; }

    const transformMatrix = window.getComputedStyle(body).transform;
    if (transformMatrix && transformMatrix !== "none") {
      const values = transformMatrix.split('(')[1].split(')')[0].split(',');
      const translateY = parseFloat(values[5]) || 0;
      if (translateY < 0) {
        const ratio = Math.min(Math.abs(translateY) / 25, 1);
        shadow.style.transform = `scale(${1 - ratio * 0.35})`; shadow.style.opacity = 1 - ratio * 0.5;
      } else { shadow.style.transform = "scale(1)"; shadow.style.opacity = "1"; }
    }
    requestAnimationFrame(updatePhysics);
  }
  body.className = "canelito-body anim-walk"; requestAnimationFrame(updatePhysics);

  setInterval(() => {
    if (currentStatus === "sit") return;
    const particle = document.createElement("div"); particle.className = "trail-particle";
    const items = ["🐾", "✨", "🐾", "⭐"]; particle.innerText = items[Math.floor(Math.random() * items.length)];
    const rect = container.getBoundingClientRect(); const gardenRect = garden.getBoundingClientRect();
    particle.style.left = (rect.left - gardenRect.left + 25) + "px"; particle.style.bottom = "35px";
    particle.style.setProperty("--x-drift", (Math.random() * 40 - 20) + "px");
    garden.appendChild(particle); setTimeout(() => particle.remove(), 1200);
  }, 220);
}
document.addEventListener("DOMContentLoaded", initCanelitoBrain);
</script>
