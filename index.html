<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi cebollín 🤎</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Segoe UI, sans-serif;
 background:linear-gradient(180deg,#140010,#2a0030);
 color:#fff;
 overflow-x:hidden;
}

#login{
 position:fixed;
 inset:0;
 display:flex;
 justify-content:center;
 align-items:center;
 background:#0a0008;
 z-index:999;
 overflow:hidden;
}

.loginCard{
 background:rgba(255,255,255,.15);
 backdrop-filter:blur(14px);
 padding:40px;
 border-radius:25px;
 text-align:center;
 box-shadow:0 0 40px rgba(255,0,120,.4);
 animation:float 4s ease-in-out infinite;
 z-index:2;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

input{
 padding:14px;
 border-radius:14px;
 border:none;
 text-align:center;
 font-size:16px;
 width:200px;
 color: #000;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:20px;
 background:linear-gradient(45deg,#ff4da6,#ff80bf);
 color:white;
 font-size:16px;
 margin-top:12px;
 cursor:pointer;
 transition:.25s;
}

button:hover{
 transform:scale(1.08);
 box-shadow:0 0 12px #ff80bf;
}

.loginRain{
 position:absolute;
 top:-20px;
 animation:loginFall linear forwards;
 opacity:.6;
}
@keyframes loginFall{
 to{ transform:translateY(110vh); opacity:.2; }
}

.bgHearts span{
 position:fixed;
 color:#ff4da6;
 animation:rise linear infinite;
 opacity:.25;
 pointer-events:none;
}
@keyframes rise{
 from{transform:translateY(100vh)}
 to{transform:translateY(-10vh)}
}

.card{
 background:#fff;
 color:#4a0030;
 margin:22px auto;
 padding:22px;
 width:95%;
 max-width:560px;
 border-radius:24px;
 box-shadow:0 12px 40px rgba(0,0,0,.25);
 border:3px solid #ffd6eb;
 text-align: center;
}

.circleImg,.musicCover{
 width:170px;
 height:170px;
 border-radius:50%;
 object-fit:cover;
 display:block;
 margin:14px auto;
 border:6px solid #ffb3d9;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:10px;
}
.grid img{
 width:100%;
 height:140px;
 object-fit:cover;
 border-radius:16px;
 cursor:pointer;
}

.carousel{
 display:flex;
 gap:14px;
 overflow:hidden;
}
.carousel img{
 width:180px;
 height:140px;
 object-fit:cover;
 border-radius:16px;
 animation:slide 30s linear infinite;
}
@keyframes slide{
 from{transform:translateX(0)}
 to{transform:translateX(-50%)}
}

#zoom{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.85);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:9999;
}
#zoom img{
 max-width:90%;
 max-height:90%;
 border-radius:18px;
}

.typewriter{
 white-space:pre-wrap;
 border-right:2px solid #ff4da6;
 animation:blink .8s infinite;
}
@keyframes blink{
50%{border-color:transparent}
}

.secretLetter{
 margin-top:15px;
 padding:20px;
 border-radius:18px;
 background:linear-gradient(45deg,#ffe0f0,#ffd1ea);
 display:none;
 white-space:pre-wrap;
}

.seal{
 font-size:42px;
 cursor:pointer;
 animation:pulse 1.5s infinite;
}
@keyframes pulse{
50%{transform:scale(1.15)}
}

.signature{
 font-family:cursive;
 font-size:22px;
 margin-top:15px;
 opacity:0;
 transition: opacity 1s;
}

.tapPhrase{
 position:fixed;
 color:#ffd6eb;
 font-size:18px;
 animation:floatUp 2s forwards;
 pointer-events:none;
 z-index: 1000;
}
@keyframes floatUp{
 to{ transform:translateY(-60px); opacity:0; }
}

@keyframes pulseCounter{
 from{transform:scale(1)}
 to{transform:scale(1.05)}
}

/* ESTILOS DEL ACUARIO */
.aquarium{
 position:relative;
 width:100%;
 height:240px;
 background:linear-gradient(180deg, #0a4a6a 0%, #063a55 25%, #032a40 60%, #021a2a 100%);
 border-radius:25px;
 overflow:hidden;
 border:6px solid #1a9abf;
 box-shadow:inset 0 0 100px rgba(0,140,200,0.6), 0 0 50px rgba(0,180,240,0.4), inset 0 -30px 40px rgba(0,0,0,0.5);
 margin-top:15px;
}

.aquarium::before{
 content:'';
 position:absolute;
 top:-50px;
 left:5%;
 width:90%;
 height:140%;
 background:linear-gradient(180deg, rgba(255,200,100,0.2) 0%, rgba(255,180,80,0.1) 30%, transparent 70%);
 pointer-events:none;
 animation:goldenRays 15s ease-in-out infinite;
}

@keyframes goldenRays{
0%,100%{opacity:0.1; transform:scale(1) translateX(0) rotate(0deg);}
25%{opacity:0.25; transform:scale(1.15) translateX(20px) rotate(2deg);}
50%{opacity:0.15; transform:scale(1.05) translateX(-10px) rotate(-1deg);}
75%{opacity:0.3; transform:scale(1.2) translateX(15px) rotate(1deg);}
}

.aquarium-sand{
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:40px;
 background:linear-gradient(180deg, #d4b080 0%, #c9a060 30%, #a88040 70%, #8b6940 100%);
 border-radius:0 0 20px 20px;
}

.seaweed{
 position:absolute;
 bottom:35px;
 font-size:44px;
 animation:sway 6s ease-in-out infinite;
 transform-origin:bottom center;
}

@keyframes sway{
0%,100%{transform:rotate(-1deg) scaleY(1) scaleX(1);}
50%{transform:rotate(1deg) scaleY(1.02) scaleX(0.99);}
}

.turtle-swim{
 position:absolute;
 font-size:52px;
 animation:swimAround 22s linear infinite;
 z-index:20;
}

@keyframes swimAround{
0%{left:2%;top:15%;transform:rotate(10deg) scaleX(1);}
42%{left:75%;top:28%;transform:rotate(10deg) scaleX(-1);}
100%{left:2%;top:15%;transform:rotate(10deg) scaleX(1);}
}

.aquarium-surface{
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:30px;
 background:linear-gradient(180deg, rgba(200,240,255,0.7) 0%, transparent 100%);
 animation:waterWaves 6s ease-in-out infinite;
 z-index:25;
}

@keyframes waterWaves{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-4px);}
}

.small-fish{
 position:absolute;
 font-size:22px;
 animation:fishSwim 30s linear infinite;
 z-index:15;
}

@keyframes fishSwim{
0%{left:-18%;transform:scaleX(1);}
50%{left:118%;transform:scaleX(-1);}
100%{left:-18%;transform:scaleX(1);}
}

.starfish{
 position:absolute;
 bottom:12px;
 left:30%;
 font-size:30px;
 animation:starBounce 8s ease-in-out infinite;
 z-index:18;
}

@keyframes starBounce{
0%,100%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-4px) rotate(-4deg);}
}

.crab{
 position:absolute;
 bottom:10px;
 left:70%;
 font-size:28px;
 animation:crabMove 12s ease-in-out infinite;
 z-index:18;
}

@keyframes crabMove{
0%,100%{transform:translateX(0);}
50%{transform:translateX(15px);}
}

.aqua-bubble{
 position:absolute;
 background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.9), rgba(150,210,255,0.2));
 border-radius:50%;
 animation:bubbleRise 6s linear infinite;
}

@keyframes bubbleRise{
0%{transform:translateY(0) scale(0.1); opacity:0;}
50%{opacity:0.8;}
100%{transform:translateY(-200px) scale(1); opacity:0;}
}

.aqua-particle{
 position:absolute;
 width:5px;
 height:5px;
 background:white;
 border-radius:50%;
 animation:particleFloat 10s ease-in-out infinite;
 opacity: 0.4;
}

@keyframes particleFloat{
0%,100%{transform:translate(0,0);}
50%{transform:translate(20px, -60px);}
}

.rock{
 position:absolute;
 bottom:30px;
 font-size:38px;
 z-index:12;
}

.snail{
 position:absolute;
 bottom:15px;
 left:50%;
 font-size:24px;
 animation:snailMove 15s ease-in-out infinite;
 z-index:17;
}

@keyframes snailMove{
0%,100%{transform:translateX(0);}
50%{transform:translateX(10px);}
}

.jellyfish{
 position:absolute;
 font-size:28px;
 animation:swimJelly 25s ease-in-out infinite;
 opacity:0.8;
 z-index:14;
}

@keyframes swimJelly{
0%,100%{left:80%;top:60%;}
50%{left:40%;top:30%;}
}

.water-current{
 position:absolute;
 width:2px;
 height:60px;
 background:linear-gradient(180deg, transparent, rgba(255,255,255,0.1), transparent);
 animation:currentFlow 8s linear infinite;
}

@keyframes currentFlow{
0%{transform:translateY(0); opacity:0;}
100%{transform:translateY(-100px); opacity:0;}
}
</style>
</head>

<body>

<div id="login">
<div class="loginCard">
<h2>Ingresa la contraseña 💖</h2>
<input type="password" id="pass" placeholder="...">
<br>
<button onclick="enter()">Entrar</button>
</div>
</div>

<div id="zoom" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<audio id="bgMusic" loop preload="auto">
<source src="https://files.catbox.moe/4nrc17.mp3">
</audio>

<audio id="ourSong">
<source src="https://files.catbox.moe/egr68n.mp3">
</audio>

<audio id="writeSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<div class="bgHearts" id="bgHearts"></div>

<div class="card">
<h2>💞 Nuestro tiempo juntos 💞</h2>
<img class="circleImg" src="https://i.imgur.com/m2rqpiu.jpeg">
<div id="counter"></div>
</div>

<div class="card">
<h2>🎵 Nuestra canción 🎵</h2>
<img class="musicCover" src="https://i.imgur.com/jbyIzFT.jpeg">
<div style="text-align:center">
<button id="btnPlay" onclick="toggleSong()">▶️ Reproducir</button>
</div>
</div>

<div class="card">
<h2>🎞️ Momentos especiales 🎞️</h2>
<div class="carousel">
<img src="https://i.imgur.com/tpH81jp.jpeg">
<img src="https://i.imgur.com/mOQ2xhz.jpeg">
<img src="https://i.imgur.com/ra5P475.jpeg">
<img src="https://i.imgur.com/0xnanwq.jpeg">
<img src="https://i.imgur.com/2Xh4XhC.jpeg">
<img src="https://i.imgur.com/UX4FUgZ.jpeg">
<img src="https://i.imgur.com/3h5EZdw.jpeg">
<img src="https://i.imgur.com/8yDYtN4.jpeg">
</div>
</div>

<div class="card">
<h2>📸 Recuerdos 📸</h2>
<div class="grid" id="gallery">
<img src="https://i.imgur.com/tpH81jp.jpeg">
<img src="https://i.imgur.com/mOQ2xhz.jpeg">
<img src="https://i.imgur.com/ra5P475.jpeg">
<img src="https://i.imgur.com/0xnanwq.jpeg">
<img src="https://i.imgur.com/2Xh4XhC.jpeg">
<img src="https://i.imgur.com/UX4FUgZ.jpeg">
<img src="https://i.imgur.com/3h5EZdw.jpeg">
<img src="https://i.imgur.com/8yDYtN4.jpeg">
<img src="https://i.imgur.com/1IveqjS.jpeg">
<img src="https://i.imgur.com/D2fqpOe.jpeg">
<img src="https://i.imgur.com/cqMYyp1.jpeg">
<img src="https://i.imgur.com/S888hKj.jpeg">
</div>
</div>

<div class="card">
<h2>🐢 Faltó el Jerry..❤️🐢</h2>
<div class="aquarium" id="aquarium">
 <div class="aquarium-surface"></div>
 <div class="turtle-swim">🐢</div>
 <div class="small-fish">🐟</div>
 <div class="small-fish" style="animation-delay:-10s">🐠</div>
 <div class="jellyfish">🪼</div>
 <div class="starfish">⭐</div>
 <div class="crab">🦀</div>
 <div class="snail">🐌</div>
 <div class="seaweed" style="left:2%">🌿</div>
 <div class="seaweed" style="left:15%">🌿</div>
 <div class="seaweed" style="left:85%">🌿</div>
 <div class="seaweed" style="left:98%">🌿</div>
 <div class="rock" style="left:3%">🪨</div>
 <div class="rock" style="left:92%">🪨</div>
 <div class="aquarium-sand"></div>
</div>
</div>

<div class="card">
<h2>📜 Poemas especiales 📜</h2>
<div id="poema" class="typewriter"></div>
</div>

<div class="card">
<h2>💌 Carta sellada 💌</h2>
<div class="seal" onclick="openLetter()">💗</div>
<div id="letter" class="secretLetter"></div>
<div id="sign" class="signature">Con amor — siempre tú 🤎</div>
</div>

<script>
/* LOGIN LLUVIA */
const login = document.getElementById("login");
const pass = document.getElementById("pass");

setInterval(()=>{
 if(login.style.display!=="none"){
  const h=document.createElement("div");
  h.className="loginRain";
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(3+Math.random()*3)+"s";
  login.appendChild(h);
  setTimeout(()=>h.remove(),6000);
 }
},300);

let musicPlayed = false;

// FUNCIÓN DE ENTRADA CORREGIDA
function enter(){
 if(pass.value.toLowerCase() === "jerry"){
  login.style.display="none";
  // Intentar reproducir música de fondo al entrar
  document.getElementById("bgMusic").play().catch(() => {});
 } else {
  alert("Contraseña incorrecta 🥺");
 }
}

function toggleSong(){
 const ourSong = document.getElementById("ourSong");
 const bgMusic = document.getElementById("bgMusic");
 const btnPlay = document.getElementById("btnPlay");
 if(ourSong.paused){
  bgMusic.pause();
  ourSong.currentTime=0;
  ourSong.play().catch(()=>{});
  btnPlay.innerHTML="⏸️ Pausar";
 } else {
  ourSong.pause();
  bgMusic.play().catch(()=>{});
  btnPlay.innerHTML="▶️ Reproducir";
 }
}

const frases=[
"Eres mi lugar favorito 🤎",
"Contigo todo es mejor 💞",
"Mi coincidencia más bonita ✨",
"Tu sonrisa es mi paz"
];

document.addEventListener("click",e=>{
 if(e.target.tagName==="BUTTON"||e.target.tagName==="INPUT") return;
 if (!musicPlayed) {
  document.getElementById("bgMusic").play().catch(() => {});
  musicPlayed = true;
 }
 const f=document.createElement("div");
 f.className="tapPhrase";
 f.innerText=frases[Math.floor(Math.random()*frases.length)];
 f.style.left=e.clientX+"px";
 f.style.top=e.clientY+"px";
 document.body.appendChild(f);
 setTimeout(()=>f.remove(),2000);
});

document.querySelectorAll("#gallery img").forEach(img=>{
 img.onclick=()=>{ 
    document.getElementById("zoom").style.display="flex"; 
    document.getElementById("zoomImg").src=img.src; 
 }
});

const bgHearts = document.getElementById("bgHearts");
for(let i=0;i<25;i++){
 const s=document.createElement("span");
 s.innerHTML="❤";
 s.style.left=Math.random()*100+"vw";
 s.style.fontSize=(16+Math.random()*26)+"px";
 s.style.animationDuration=(8+Math.random()*10)+"s";
 bgHearts.appendChild(s);
}

const start = new Date(2024, 8, 11);

function updateCounter(){
 const now = new Date();
 const diff = now - start;
 const days = Math.floor(diff / (1000*60*60*24));
 const hours = Math.floor((diff / (1000*60*60)) % 24);
 const minutes = Math.floor((diff / (1000*60)) % 60);
 const seconds = Math.floor((diff / 1000) % 60);
 document.getElementById("counter").innerHTML = `<h3 style="margin:0;font-size:28px;animation:pulseCounter 1s infinite alternate;">${days} días 💗</h3>${hours}h ${minutes}m ${seconds}s`;
}

updateCounter();
setInterval(updateCounter,1000);

const poemaTexto="Cuando me enamoré de ti\n\n\"Cuando me enamoré de ti, entendí que no era que todas aquellas personas que me hablaron del amor estuvieran mal, sino que nunca me hablaron de ti.\n\nTe prometo\n\n\"Si te apagas, te prometo amarte con más fuerza.\nPrometo devolverte la luz que te caracteriza,\nregar tu jardín con el amor que me brindaste cuando estaba marchito.\nTe prometo cuidarte cuando enfermes\ny hacer lo que haga falta para asegurarme de que vuelvas a florecer.\n\nPorque, mi amor, si hay algo que le pido a Dios es que,\nsi alguna vez llega a ser necesario,\nme permita ser aquello que te haga falta,\ncomo tú lo fuiste conmigo.\"";

function typeText(t, el){
 el.textContent="";
 const chars=[...t];
 let i=0;
 function w(){
  if(i<chars.length){
   el.textContent+=chars[i++];
   setTimeout(w,28);
  }
 }
 w();
}

setTimeout(()=>typeText(poemaTexto, document.getElementById("poema")),1200);

function openLetter(){
 document.getElementById("writeSound").play();
 const txt="Esta carta es para ti.\nTe amo mi cebollín 🤎\nEspero compartir más cosas juntos 🥰🧸";
 const letter = document.getElementById("letter");
 letter.style.display="block";
 typeText(txt,letter);
 setTimeout(()=>document.getElementById("sign").style.opacity=1,4200);
}

/* EFECTOS DEL ACUARIO */
function createAquariumEffects(){
 const aquarium = document.getElementById("aquarium");
 if(!aquarium) return;
 
 setInterval(()=>{
  const bubble = document.createElement("div");
  bubble.className = "aqua-bubble";
  const size = 4 + Math.random() * 14;
  bubble.style.width = size + "px";
  bubble.style.height = size + "px";
  bubble.style.left = (Math.random() * 94 + 3) + "%";
  bubble.style.bottom = "40px";
  bubble.style.animationDuration = (5 + Math.random() * 5) + "s";
  aquarium.appendChild(bubble);
  setTimeout(()=>{ if(bubble.parentNode) bubble.remove(); }, 10000);
 }, 600);
 
 setInterval(()=>{
  const particle = document.createElement("div");
  particle.className = "aqua-particle";
  particle.style.left = (Math.random() * 96 + 2) + "%";
  particle.style.bottom = (Math.random() * 180 + 50) + "px";
  aquarium.appendChild(particle);
  setTimeout(()=>{ if(particle.parentNode) particle.remove(); }, 15000);
 }, 1500);
}

setTimeout(createAquariumEffects, 700);
</script>
</body>
</html>
