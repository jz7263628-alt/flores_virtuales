<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi cebollín 🤎</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* --- ESTILOS DE TU CÓDIGO BASE ORIGINAL --- */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(180deg, #140010 0%, #2a0030 100%); /* Fondo morado original */
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}

/* --- CORRECCIÓN: LLUVIA DE CORAZONES POR DELANTE (Z-INDEX ALTO) --- */
.bgHearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999; /* Ahora caen por delante de las tarjetas blancas */
  overflow: hidden;
}
.bgHearts span {
  position: absolute;
  color: #ff4da6;
  text-shadow: 0 0 5px rgba(255, 77, 166, 0.6);
  animation: rise linear infinite;
  bottom: -50px;
}
@keyframes rise {
  from { transform: translateY(0); opacity: 0.8; }
  to { transform: translateY(-110vh); opacity: 0; }
}

/* --- PANTALLA DE LOGIN ORIGINAL --- */
#login {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #140010 0%, #2a0030 100%); 
  z-index: 99999;
  overflow: hidden;
}
.loginCard {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  padding: 40px 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255, 0, 120, 0.4);
  animation: float 4s ease-in-out infinite;
  z-index: 100000;
  width: 90%;
  max-width: 340px;
}
.loginCard h2 {
  color: #fff;
  margin-top: 0;
  font-size: 22px;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
#pass {
  padding: 14px;
  border-radius: 14px;
  border: 2px solid #ff80bf;
  text-align: center;
  font-size: 16px;
  width: 100%;
  color: #000;
  background: #fff;
  margin-bottom: 15px;
}
#login button {
  padding: 12px 24px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff4da6, #ff80bf);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: .25s;
  width: 100%;
}
#login button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #ff80bf;
}
</style>
<style>
/* --- LAS TARJETAS BLANCAS ORIGINALES --- */
.card {
  background: #fff;
  color: #4a0030;
  margin: 25px auto;
  padding: 22px;
  width: 92%;
  max-width: 540px;
  border-radius: 24px;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
  border: 3px solid #ffd6eb;
  text-align: center;
  position: relative;
  z-index: 10; 
}
.card h2 {
  margin-top: 0;
  font-size: 22px;
  color: #4a0030;
}

.circleImg, .musicCover {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin: 14px auto;
  border: 6px solid #ffb3d9;
}
#counter {
  font-size: 16px;
  line-height: 1.4;
}
.card button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff4da6, #ff80bf);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: .25s;
}
.card button:hover {
  transform: scale(1.06);
}

/* --- TU CARRUSEL HORIZONTAL ORIGINAL --- */
.carousel {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 10px;
  scroll-behavior: smooth;
}
.carousel img {
  width: 180px;
  height: 140px;
  object-fit: cover;
  border-radius: 16px;
  flex-shrink: 0;
}

/* --- TU CUADRÍCULA DE FOTOS ORIGINAL --- */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.grid img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.2s;
}
.grid img:hover {
  transform: scale(1.03);
}

#zoom {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999999;
}
#zoom img {
  max-width: 92%;
  max-height: 85%;
  border-radius: 18px;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}
.typewriter {
  white-space: pre-wrap;
  border-right: 2px solid #ff4da6;
  animation: blink .8s infinite;
  text-align: left;
  font-size: 15px;
  line-height: 1.5;
}
@keyframes blink { 50% { border-color: transparent; } }
.secretLetter {
  margin-top: 15px;
  padding: 20px;
  border-radius: 18px;
  background: linear-gradient(45deg, #ffe0f0, #ffd1ea);
  display: none;
  white-space: pre-wrap;
  text-align: left;
  font-size: 15px;
  color: #4a0030;
}
.seal { font-size: 45px; cursor: pointer; animation: pulse 1.5s infinite; display: inline-block; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.signature { font-family: cursive; font-size: 20px; margin-top: 15px; opacity: 0; transition: opacity 1s; color: #ff4da6; }
.tapPhrase { position: fixed; color: #ffd6eb; font-size: 16px; font-weight: bold; animation: floatUp 2s forwards; pointer-events: none; z-index: 9999; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
@keyframes floatUp { to { transform: translateY(-70px); opacity: 0; } }
</style>
<style>
/* --- RESTAURACIÓN TOTAL DEL ACUARIO DE JERRY (COMO EN 1000067084_2.jpg) --- */
.aquarium {
  position: relative; 
  width: 100%; 
  height: 240px;
  /* El azul original de tu acuario */
  background: linear-gradient(180deg, #0f5a80 0%, #0a4060 100%) !important;
  border-radius: 25px; 
  overflow: hidden; 
  border: 4px solid #00a8e8;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
  margin-top: 15px;
}
/* Jerry en posición fija y tierna a la izquierda (Sin animación que lo saque) */
.turtle-original {
  position: absolute;
  left: 12%;
  top: 25%;
  font-size: 52px;
  z-index: 20;
}
/* Algas estáticas en sus esquinas correspondientes */
.seaweed-left { position: absolute; bottom: 15px; left: 5%; font-size: 38px; z-index: 11; }
.seaweed-right { position: absolute; bottom: 15px; right: 5%; font-size: 38px; z-index: 11; }
.starfish-floor { position: absolute; bottom: 10px; left: 32%; font-size: 26px; z-index: 12; }
.snail-floor { position: absolute; bottom: 12px; left: 52%; font-size: 22px; z-index: 12; }
.crab-floor { position: absolute; bottom: 10px; right: 28%; font-size: 24px; z-index: 12; }
.jelly-center { position: absolute; top: 40%; left: 46%; font-size: 26px; z-index: 15; }

/* --- EL JARDÍN DE CANELITO --- */
.garden-card { background: #fff; color: #4a0030; margin: 25px auto; padding: 22px; width: 92%; max-width: 540px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,.3); border: 3px solid #ffd6eb; text-align: center; position: relative; z-index: 10; }
.garden-premium {
  position: relative; width: 100%; height: 260px;
  background: linear-gradient(180deg, #bde0fe 0%, #f1faee 45%, #d8f3dc 46%, #74c69d 100%);
  border-radius: 20px; overflow: hidden; border: 5px solid #95d5b2;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.1); margin-top: 15px;
}
.sun-premium { position: absolute; top: 15px; right: 25px; width: 40px; height: 40px; background: #ffb703; border-radius: 50%; box-shadow: 0 0 20px #ffb703; animation: sunGlow 3s ease-in-out infinite alternate; z-index: 5; }
@keyframes sunGlow { from { transform: scale(1); } to { transform: scale(1.12); } }
.hill-back { position: absolute; bottom: 30px; width: 120%; height: 65px; left: -10%; background: #95d5b2; border-radius: 50% 50% 0 0; opacity: 0.6; z-index: 10; }
.hill-front { position: absolute; bottom: 0; width: 130%; height: 45px; left: -15%; background: #52b788; border-radius: 40% 60% 0 0; z-index: 15; }
.foreground-grass { position: absolute; bottom: 3px; width: 100%; text-align: center; font-size: 18px; letter-spacing: 8px; z-index: 60; pointer-events: none; }
.garden-cloud { position: absolute; font-size: 28px; opacity: 0.4; animation: cloudMove 25s linear infinite; z-index: 6; top: 15px; left: -50px; }
@keyframes cloudMove { to { left: 110%; } }
.butterfly-premium { position: absolute; font-size: 20px; z-index: 25; animation: insectFly 7s ease-in-out infinite alternate; top: 40px; left: 20px; }
@keyframes insectFly { 0% { transform: translate(0,0); } 100% { transform: translate(200px, -20px); } }
.toy-ball { position: absolute; bottom: 12px; font-size: 20px; z-index: 18; right: 25%; animation: ballBounce 2.5s ease-in-out infinite alternate; }
@keyframes ballBounce { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-40px) rotate(360deg); } }

/* ELEMENTOS PROPIOS DE CANELITO */
.canelito-pup-container { position: absolute; bottom: 10px; left: 40px; width: 85px; height: 80px; z-index: 45; cursor: pointer; transition: left 0.1s linear; -webkit-tap-highlight-color: transparent; }
.pup-shadow { position: absolute; bottom: -1px; left: 10px; width: 62px; height: 7px; background: rgba(0,0,0,0.2); border-radius: 50%; z-index: 40; transition: all 0.1s; }
.pup-body-wrapper { position: relative; width: 100%; height: 100%; transform-origin: bottom center; animation: pupWalk 0.4s ease-in-out infinite alternate; }
@keyframes pupWalk { 0% { transform: translateY(0); } 100% { transform: translateY(-6px); } }
.pup-torso { position: absolute; bottom: 15px; left: 10px; width: 54px; height: 38px; background: #c68a4c; border-radius: 20px; z-index: 42; }
.pup-head { position: absolute; top: 8px; left: 35px; width: 42px; height: 42px; background: #b0753c; border-radius: 50%; z-index: 46; }
.pup-eye { position: absolute; top: 12px; width: 7px; height: 7px; background: #fff; border-radius: 50%; }
.eye-left { left: 10px; } .eye-right { left: 24px; }
.pupil { position: absolute; top: 1px; left: 1px; width: 4.5px; height: 4.5px; background: #000; border-radius: 50%; }
.pup-snout { position: absolute; bottom: 5px; left: 12px; width: 18px; height: 13px; background: #e9c46a; border-radius: 7px; }
.pup-nose { width: 7px; height: 4px; background: #000; border-radius: 3px; margin: 2px auto 0; }
.pup-tongue { width: 5px; height: 4px; background: #ff4d6d; border-radius: 0 0 2px 2px; margin: 0 auto; animation: dogPant 0.2s infinite alternate; }
@keyframes dogPant { from { height: 1px; } to { height: 4px; } }
.pup-ear { position: absolute; top: -4px; width: 12px; height: 18px; background: #9a5f2a; border-radius: 6px; transform-origin: top center; }
.ear-left { left: 3px; transform: rotate(10deg); } .ear-right { right: 3px; transform: rotate(-10deg); }
.pup-tail { position: absolute; bottom: 28px; left: 0px; width: 16px; height: 11px; background: #b0753c; border-radius: 10px 0 0 10px; transform-origin: right center; animation: tailWag 0.1s linear infinite alternate; }
@keyframes tailWag { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }
.pup-leg { position: absolute; bottom: 2px; width: 10px; height: 16px; background: #9a5f2a; border-radius: 4px; transform-origin: top center; }
.leg-fl { left: 42px; animation: legMove 0.4s linear infinite alternate; }
.leg-fr { left: 50px; animation: legMove 0.4s linear infinite -0.2s alternate; }
.leg-bl { left: 14px; animation: legMove 0.4s linear infinite -0.2s alternate; }
.leg-br { left: 22px; animation: legMove 0.4s linear infinite alternate; }
@keyframes legMove { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }
.pup-jump-active { animation: backflip 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards !important; }
@keyframes backflip {
  0% { transform: translateY(0) rotate(0deg); }
  40% { transform: translateY(-90px) rotate(-160deg); }
  100% { transform: translateY(0) rotate(-360deg); }
}
.canelito-bark { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: #fff; color: #ff4da6; font-weight: bold; font-size: 12px; padding: 3px 8px; border-radius: 10px; border: 2px solid #ffd6eb; animation: barkPop 0.5s ease-out forwards; pointer-events: none; z-index: 100; }
@keyframes barkPop { 0% { transform: translateX(-50%) scale(0); opacity: 0; } 50% { transform: translateX(-50%) scale(1.1); opacity: 1; } 100% { transform: translateX(-50%) scale(0.8) translateY(-15px); opacity: 0; } }
.trail-particle { position: absolute; font-size: 14px; pointer-events: none; z-index: 38; animation: trailFade 1s ease-out forwards; }
@keyframes trailFade { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
</style>
</head>

<script>
// --- LOGICA DE LOGIN ORIGINAL ---
const audioBG = document.getElementById("bgMusic");
const audioSong = document.getElementById("ourSong");
const audioWrite = document.getElementById("writeSound");
let firstInteractionDone = false;

function enter(){
  const inputPass = document.getElementById("pass");
  const loginContainer = document.getElementById("login");
  if(inputPass && loginContainer){
    if(inputPass.value === "Jerry"){
      if(!firstInteractionDone){
        audioBG.play().catch(err => console.log("Permiso audio deferido:", err));
        audioSong.load(); audioWrite.load();
        firstInteractionDone = true;
      }
      loginContainer.style.display = "none";
    } else {
      alert("Contraseña incorrecta ❌");
    }
  }
}

// --- REPRODUCTOR ORIGINAL DE TU CONTENIDO ---
function toggleSong(){
  if(audioSong.paused){
    audioBG.pause(); 
    audioSong.currentTime = 0; 
    audioSong.play().catch(()=>{});
    document.getElementById("btnPlay").innerHTML = "⏸️ Pausar";
  } else {
    audioSong.pause(); 
    audioBG.play().catch(()=>{});
    document.getElementById("btnPlay").innerHTML = "▶️ Reproducir";
  }
}

// --- FRASES ORIGINALES EN PANTALLA ---
const frases = ["Eres mi lugar favorito 🤎", "Contigo todo es mejor 💞", "Mi coincidencia más bonita ✨", "Tu sonrisa es mi paz"];
document.addEventListener("click", e => {
  if(e.target.closest("#canelitoObj") || e.target.closest("#login") || e.target.closest(".aquarium") || e.target.tagName === "BUTTON" || e.target.tagName === "IMG") return;
  const f = document.createElement("div"); 
  f.className = "tapPhrase";
  f.innerText = frases[Math.floor(Math.random() * frases.length)];
  f.style.left = e.clientX + "px"; 
  f.style.top = e.clientY + "px";
  document.body.appendChild(f); 
  setTimeout(() => f.remove(), 2000);
});

// --- ZOOM DE IMÁGENES ORIGINAL ---
document.querySelectorAll("#gallery img, .carousel img").forEach(img => {
  img.onclick = () => { 
    const zoom = document.getElementById("zoom");
    const zoomImg = document.getElementById("zoomImg");
    zoom.style.display = "flex"; 
    zoomImg.src = img.src; 
  }
});

// --- GENERACIÓN DE LA LLUVIA DE CORAZONES (AHORA FLOTAN ARRIBA DE TODO) ---
const bgHeartsContainer = document.getElementById("bgHearts");
if(bgHeartsContainer){
  for(let i = 0; i < 35; i++){ 
    const s = document.createElement("span"); 
    s.innerHTML = "❤";
    s.style.left = Math.random() * 100 + "vw"; 
    s.style.fontSize = (16 + Math.random() * 22) + "px";
    s.style.animationDuration = (5 + Math.random() * 7) + "s"; 
    s.style.animationDelay = (Math.random() * 6) + "s";
    bgHeartsContainer.appendChild(s);
  }
}

// --- CONTADOR ORIGINAL ---
const start = new Date(2024, 8, 11, 0, 0, 0); 
function updateCounter(){
  const now = new Date(); 
  const diff = now - start;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);
  const counterEl = document.getElementById("counter");
  if(counterEl){
    counterEl.innerHTML = `<h3 style="margin:0 0 5px 0; font-size:26px; color:#ff4da6;">${days} días 💗</h3><span style="font-size:14px; color:#555;">${hours} horas ${minutes} minutos ${seconds} segundos</span>`;
  }
}
updateCounter(); 
setInterval(updateCounter, 1000);

const poemaTexto = "Cuando me enamoré de ti\n\n\"Cuando me enamoré de ti, entendí que no era que todas aquellas personas que me hablaron del amor estuvieran mal, sino que nunca me hablaron de ti.\"\n\nTe prometo\n\n\"Si te apagas, te prometo amarte con más fuerza.\nPrometo devolverte la luz que te caracteriza,\nregar tu jardín con el amor que me brindaste cuando estaba marchito.\nTe prometo cuidarte cuando enfermes\ny hacer lo que haga falta para asegurarme de que vuelvas a florecer.\n\nPorque, mi amor, si hay algo que le pido a Dios es que,\nsi alguna vez llega a ser necesario,\nme permita ser aquello que te haga falta,\ncomo tú lo fuiste conmigo.\"";

function typeText(t, el, callback){
  el.textContent = ""; 
  const chars = [...t]; 
  let i = 0;
  function w(){ 
    if(i < chars.length){ 
      el.textContent += chars[i++]; 
      setTimeout(w, 20); 
    } else if (callback) {
      callback();
    }
  }
  w();
}
const poemaEl = document.getElementById("poema");
if(poemaEl) { setTimeout(() => typeText(poemaTexto, poemaEl), 1500); }

// --- LOGICA TOTALMENTE INDEPENDIENTE DE CANELITO ---
let canelitoJumping = false;

function canelitoTrick() {
  if (canelitoJumping) return;
  canelitoJumping = true;
  const body = document.getElementById("pupBody");
  const container = document.getElementById("canelitoObj");
  if(!body || !container) return;
  body.className = "pup-body-wrapper pup-jump-active";
  
  const bark = document.createElement("div");
  bark.className = "canelito-bark";
  bark.innerText = ["¡Guau! 🐾", "¡Arf! ❤️", "¡Yap! ✨"][Math.floor(Math.random() * 3)];
  container.appendChild(bark);
  setTimeout(() => bark.remove(), 500);
  
  setTimeout(() => {
    body.className = "pup-body-wrapper";
    canelitoJumping = false;
  }, 750);
}

function startCanelitoPatrol() {
  const container = document.getElementById("canelitoObj");
  const garden = document.getElementById("canelitoGarden");
  if (!container || !garden) return;
  let pos = 30; let dir = 1;
  
  setInterval(() => {
    if (canelitoJumping) return;
    const maxW = garden.clientWidth - 90;
    pos += 1.6 * dir;
    if (pos >= maxW) { dir = -1; container.style.transform = "scaleX(-1)"; }
    if (pos <= 10) { dir = 1; container.style.transform = "scaleX(1)"; }
    container.style.left = pos + "px";
  }, 35);

  setInterval(() => {
    if (canelitoJumping) return;
    const p = document.createElement("div"); 
    p.className = "trail-particle";
    p.innerText = "🐾";
    const gRect = garden.getBoundingClientRect(); const cRect = container.getBoundingClientRect();
    p.style.left = (cRect.left - gRect.left + 22) + "px"; p.style.bottom = "20px";
    garden.appendChild(p); setTimeout(() => p.remove(), 900);
  }, 350);
}
setTimeout(startCanelitoPatrol, 1000);
</script>
