<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi cebollín 🤎</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* CSS COMPLETO E INTEGRADO */
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI, sans-serif;background:linear-gradient(180deg,#140010,#2a0030);color:#fff;overflow-x:hidden}
#login{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#0a0008;z-index:9999;overflow:hidden}
.loginCard{background:rgba(255,255,255,.15);backdrop-filter:blur(14px);padding:40px;border-radius:25px;text-align:center;box-shadow:0 0 40px rgba(255,0,120,.4);animation:float 4s ease-in-out infinite;z-index:2}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
input{padding:14px;border-radius:14px;border:none;text-align:center;font-size:16px;width:200px;color:#000}
button{padding:12px 20px;border:none;border-radius:20px;background:linear-gradient(45deg,#ff4da6,#ff80bf);color:white;font-size:16px;margin-top:12px;cursor:pointer;transition:.25s}
button:hover{transform:scale(1.08);box-shadow:0 0 12px #ff80bf}
.loginRain{position:absolute;top:-20px;animation:loginFall linear forwards;opacity:.6;z-index:1}
@keyframes loginFall{to{transform:translateY(110vh);opacity:.2}}
#bgHearts { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; pointer-events: none; overflow: hidden; }
#bgHearts span { position: absolute; color: #ff4da6; animation: fall linear infinite; opacity: 0.6; }
@keyframes fall { 0% { transform: translateY(-10vh); } 100% { transform: translateY(110vh); } }
.card{background:#fff;color:#4a0030;margin:22px auto;padding:22px;width:95%;max-width:560px;border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,.25);border:3px solid #ffd6eb; position: relative; z-index: 5;}
.circleImg,.musicCover{width:170px;height:170px;border-radius:50%;object-fit:cover;display:block;margin:14px auto;border:6px solid #ffb3d9}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.grid img{width:100%;height:140px;object-fit:cover;border-radius:16px;cursor:pointer}
.carousel{display:flex;gap:14px;overflow:hidden}
.carousel img{width:180px;height:140px;object-fit:cover;border-radius:16px;animation:slide 30s linear infinite}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
#zoom{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:99999}
#zoom img{max-width:90%;max-height:90%;border-radius:18px}
.typewriter{white-space:pre-wrap;border-right:2px solid #ff4da6;animation:blink .8s infinite}
@keyframes blink{50%{border-color:transparent}}
.secretLetter{margin-top:15px;padding:20px;border-radius:18px;background:linear-gradient(45deg,#ffe0f0,#ffd1ea);display:none;white-space:pre-wrap}
.seal{font-size:42px;cursor:pointer;animation:pulse 1.5s infinite}
@keyframes pulse{50%{transform:scale(1.15)}}
.signature{font-family:cursive;font-size:22px;margin-top:15px;opacity:0}
.tapPhrase{position:fixed;color:#ffd6eb;font-size:18px;animation:floatUp 2s forwards;pointer-events:none; z-index: 9999;}
@keyframes floatUp{to{transform:translateY(-60px);opacity:0}}
.aquarium{position:relative;width:100%;height:240px;background:linear-gradient(180deg,#0a4a6a 0%,#063a55 25%,#032a40 60%,#021a2a 100%);border-radius:25px;overflow:hidden;border:6px solid #1a9abf;box-shadow:inset 0 0 100px rgba(0,140,200,0.6),0 0 50px rgba(0,180,240,0.4),inset 0 -30px 40px rgba(0,0,0,0.5);margin-top:15px}
.aquarium::before{content:'';position:absolute;top:-50px;left:5%;width:90%;height:140%;background:linear-gradient(180deg,rgba(255,200,100,0.2) 0%,rgba(255,180,80,0.1) 30%,transparent 70%);pointer-events:none;animation:goldenRays 15s ease-in-out infinite}
@keyframes goldenRays{0%,100%{opacity:0.1;transform:scale(1) translateX(0) rotate(0deg)}25%{opacity:0.25;transform:scale(1.15) translateX(20px) rotate(2deg)}50%{opacity:0.15;transform:scale(1.05) translateX(-10px) rotate(-1deg)}75%{opacity:0.3;transform:scale(1.2) translateX(15px) rotate(1deg)}}
.aquarium::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:60px;background:linear-gradient(180deg,transparent 0%,rgba(10,30,40,0.9) 100%);pointer-events:none;border-radius:0 0 18px 18px}
.aquarium-sand{position:absolute;bottom:0;left:0;width:100%;height:40px;background:linear-gradient(180deg,#d4b080 0%,#c9a060 30%,#a88040 70%,#8b6940 100%);border-radius:0 0 20px 20px;box-shadow:0 -8px 20px rgba(0,0,0,0.4),inset 0 5px 15px rgba(255,255,255,0.1)}
.seaweed{position:absolute;bottom:35px;font-size:44px;animation:sway 6s ease-in-out infinite;transform-origin:bottom center}
@keyframes sway{0%,100%{transform:rotate(-1deg) scaleY(1)}15%{transform:rotate(2deg) scaleY(1.04)}50%{transform:rotate(1deg) scaleY(1.02)}}
.turtle-swim{position:absolute;font-size:52px;animation:swimAround 22s linear infinite;z-index:20}
@keyframes swimAround{0%{left:2%;top:15%;transform:rotate(10deg)}50%{left:75%;top:28%;transform:rotate(10deg) scaleX(-1)}100%{left:2%;top:15%}}
.aquarium-surface{position:absolute;top:0;left:0;width:100%;height:30px;background:linear-gradient(180deg,rgba(200,240,255,0.7) 0%,transparent 100%);animation:waterWaves 6s ease-in-out infinite;z-index:25}
@keyframes waterWaves{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.small-fish{position:absolute;font-size:22px;animation:fishSwim 30s linear infinite;opacity:0.9;z-index:15}
@keyframes fishSwim{0%{left:-18%;transform:scaleX(1)}50%{left:118%;transform:scaleX(-1)}100%{left:-18%;transform:scaleX(1)}}
.starfish{position:absolute;bottom:12px;left:30%;font-size:30px;animation:starBounce 8s ease-in-out infinite;z-index:18}
@keyframes starBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.crab{position:absolute;bottom:10px;left:70%;font-size:28px;animation:crabMove 12s ease-in-out infinite;z-index:18}
@keyframes crabMove{0%,100%{transform:translateX(0)}50%{transform:translateX(18px)}}
.aqua-bubble{position:absolute;background:radial-gradient(circle,rgba(255,255,255,0.9),transparent);border-radius:50%;animation:bubbleRise 6s linear infinite}
@keyframes bubbleRise{0%{transform:translateY(0);opacity:0}50%{transform:translateY(-80px);opacity:0.8}100%{transform:translateY(-250px);opacity:0}}
.aqua-particle{position:absolute;width:5px;height:5px;background:radial-gradient(circle,rgba(255,255,200,0.9),transparent);border-radius:50%;animation:particleFloat 10s ease-in-out infinite}
@keyframes particleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-120px)}}
.rock{position:absolute;bottom:30px;font-size:38px;z-index:12}
.snail{position:absolute;bottom:15px;left:50%;font-size:24px;animation:snailMove 15s ease-in-out infinite;z-index:17}
@keyframes snailMove{0%,100%{transform:translateX(0)}50%{transform:translateX(20px)}}
.jellyfish{position:absolute;font-size:28px;animation:swimJelly 25s ease-in-out infinite;opacity:0.85;z-index:14}
@keyframes swimJelly{0%{left:80%;top:60%}50%{left:40%;top:45%}100%{left:80%;top:60%}}
/* --- ZONA CANELITO MEJORADA --- */
.garden-card{background:#fff;color:#4a0030;margin:25px auto;padding:22px;width:95%;max-width:560px;border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,.25);border:3px solid #ffd6eb;text-align:center; position: relative; z-index: 5;}
.garden-premium { position: relative; height: 220px; background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 60%, #98FB98 100%); border-radius: 15px; overflow: hidden; margin-top: 10px; border: 3px solid #81d4fa; }
.canelito-pup-container { position: absolute; bottom: 30px; left: 30px; cursor: pointer; z-index: 10; transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
.pup-shadow { position: absolute; bottom: -5px; left: 5px; width: 50px; height: 10px; background: rgba(0,0,0,0.2); border-radius: 50%; transition: transform 0.3s, opacity 0.3s; }
.pup-body-wrapper { width: 62px; height: 42px; background: linear-gradient(135deg, #8B4513, #6b340e); border-radius: 20px; position: relative; animation: trot 0.25s infinite alternate; }
@keyframes trot { 0% { transform: translateY(0) rotate(-2deg); } 100% { transform: translateY(-5px) rotate(2deg); } }
.pup-jump-active { animation: pupJump 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67) !important; }
.pup-jump-active .pup-shadow { transform: scale(0.6); opacity: 0.3; }
@keyframes pupJump { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-70px) rotate(-15deg); } }
.sun-premium { position: absolute; top: 10px; right: 20px; width: 45px; height: 45px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 30px #FFD700; }
.toy-ball { position: absolute; bottom: 35px; right: 40px; font-size: 24px; animation: ballBounce 2s infinite; }
@keyframes ballBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>
</head>
<body>
<div class="bgHearts" id="bgHearts"></div>
<div id="login">
  <div class="loginCard">
    <h2>Ingresa la contraseña 💖</h2>
    <input id="pass" type="text" placeholder="Contraseña...">
    <br>
    <button onclick="enter()">Entrar</button>
  </div>
</div>
<div id="zoom" onclick="this.style.display='none'"><img id="zoomImg"></div>
<audio id="bgMusic" loop preload="auto" playsinline><source src="https://files.catbox.moe/4nrc17.mp3" type="audio/mpeg"></audio>
<audio id="ourSong" preload="auto" playsinline><source src="https://files.catbox.moe/egr68n.mp3" type="audio/mpeg"></audio>
<audio id="writeSound" preload="auto" playsinline><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>

<div class="card"><h2>💞 Nuestro tiempo juntos 💞</h2><img class="circleImg" src="https://i.imgur.com/m2rqpiu.jpeg"><div id="counter"></div></div>
<div class="card"><h2>🎵 Nuestra canción 🎵</h2><img class="musicCover" src="https://i.imgur.com/jbyIzFT.jpeg"><div style="text-align:center"><button id="btnPlay" onclick="toggleSong()">▶️ Reproducir</button></div></div>
<div class="card"><h2>🎞️ Momentos especiales 🎞</h2><div class="carousel"><img src="https://i.imgur.com/tpH81jp.jpeg"><img src="https://i.imgur.com/mOQ2xhz.jpeg"><img src="https://i.imgur.com/ra5P475.jpeg"><img src="https://i.imgur.com/0xnanwq.jpeg"><img src="https://i.imgur.com/2Xh4XhC.jpeg"><img src="https://i.imgur.com/UX4FUgZ.jpeg"><img src="https://i.imgur.com/3h5EZdw.jpeg"><img src="https://i.imgur.com/8yDYtN4.jpeg"></div></div>
<div class="card"><h2>📸 Recuerdos 📸</h2><div class="grid" id="gallery"><img src="https://i.imgur.com/tpH81jp.jpeg"><img src="https://i.imgur.com/mOQ2xhz.jpeg"><img src="https://i.imgur.com/ra5P475.jpeg"><img src="https://i.imgur.com/0xnanwq.jpeg"><img src="https://i.imgur.com/2Xh4XhC.jpeg"><img src="https://i.imgur.com/UX4FUgZ.jpeg"><img src="https://i.imgur.com/3h5EZdw.jpeg"><img src="https://i.imgur.com/8yDYtN4.jpeg"><img src="https://i.imgur.com/1IveqjS.jpeg"><img src="https://i.imgur.com/D2fqpOe.jpeg"><img src="https://i.imgur.com/cqMYyp1.jpeg"><img src="https://i.imgur.com/S888hKj.jpeg"></div></div>
<div class="card"><h2>📜 Poemas especiales 📜</h2><div id="poema" class="typewriter"></div></div>
<div class="card"><h2>💌 Carta sellada 💌</h2><div class="seal" onclick="openLetter()">💗</div><div id="letter" class="secretLetter"></div><div id="sign" class="signature">Con amor — siempre tú 🤎</div></div>
<div class="card"><h2>🐢 Faltó el Jerry..❤️🐢</h2><div class="aquarium" id="aquarium"><div class="aquarium-surface"></div><div class="turtle-swim">🐢</div><div class="small-fish">🐟</div><div class="small-fish" style="animation-delay:-10s">🐠</div><div class="jellyfish">🪼</div><div class="starfish">⭐</div><div class="crab">🦀</div><div class="snail">🐌</div><div class="seaweed" style="left:2%">🌿</div><div class="seaweed" style="left:15%">🌿</div><div class="seaweed" style="left:85%">🌿</div><div class="seaweed" style="left:98%">🌿</div><div class="rock" style="left:3%">🪨</div><div class="rock" style="left:92%">🪨</div><div class="aquarium-sand"></div></div></div>

<div class="garden-card">
  <h2>¡Toca a Canelito! 🐾❤️</h2>
  <div class="garden-premium" id="canelitoGarden">
    <div class="sun-premium"></div>
    <div class="toy-ball">⚽</div>
    <div class="canelito-pup-container" id="canelitoObj" onclick="canelitoTrick()">
      <div class="pup-shadow" id="pupShadow"></div>
      <div class="pup-body-wrapper" id="pupBody"></div>
    </div>
  </div>
</div>
<script>
// --- LÓGICA ORIGINAL ---
function enter(){
    let pass = document.getElementById("pass").value;
    if(pass === "tu_contraseña_aqui") { // Reemplaza aquí con tu clave real
        document.getElementById("login").style.display = "none";
        document.getElementById("bgMusic").play();
        createHearts();
    } else { alert("Contraseña incorrecta 💔"); }
}

function toggleSong(){
    let song = document.getElementById("ourSong");
    let btn = document.getElementById("btnPlay");
    if(song.paused){ song.play(); btn.innerText = "⏸️ Pausar"; }
    else{ song.pause(); btn.innerText = "▶️ Reproducir"; }
}

function createHearts(){
    let container = document.getElementById("bgHearts");
    for(let i=0; i<30; i++){
        let span = document.createElement("span");
        span.innerHTML = "💖";
        span.style.left = Math.random()*100 + "vw";
        span.style.animationDuration = (Math.random()*3+2) + "s";
        container.appendChild(span);
    }
}

function openLetter(){
    let letter = document.getElementById("letter");
    let sign = document.getElementById("sign");
    letter.style.display = "block";
    sign.style.opacity = "1";
    document.getElementById("writeSound").play();
    letter.innerText = "Aquí va tu carta original..."; // Pega aquí tu texto original
}

// --- LÓGICA CANELITO MEJORADA ---
let canelitoJumping = false;
function canelitoTrick() {
  if (canelitoJumping) return;
  canelitoJumping = true;
  const body = document.getElementById("pupBody");
  body.classList.add("pup-jump-active");
  setTimeout(() => {
    body.classList.remove("pup-jump-active");
    canelitoJumping = false;
  }, 600);
}

function startCanelitoPatrol() {
  const container = document.getElementById("canelitoObj");
  const garden = document.getElementById("canelitoGarden");
  if (!container || !garden) return;
  
  let pos = 30, dir = 1;
  setInterval(() => {
    if (canelitoJumping) return;
    const maxW = garden.clientWidth - 90;
    pos += 40 * dir;
    if (pos >= maxW) { dir = -1; container.style.transform = "scaleX(-1)"; }
    else if (pos <= 10) { dir = 1; container.style.transform = "scaleX(1)"; }
    container.style.left = pos + "px";
  }, 2000);
}

// Inicializadores (Asegúrate de incluir tus funciones de fecha/poema aquí)
window.onload = () => {
    startCanelitoPatrol();
    // [PEGA AQUÍ TU LÓGICA DEL CONTADOR Y POEMA]
};
</script>
</body>
</html>
