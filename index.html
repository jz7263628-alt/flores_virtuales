<script>
setInterval(()=>{
 const loginContainer = document.getElementById("login");
 if(loginContainer && loginContainer.style.display!=="none"){
  const h=document.createElement("div");
  h.className="loginRain";
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(3+Math.random()*3)+"s";
  loginContainer.appendChild(h);
  setTimeout(()=>h.remove(),6000);
 }
},300);

const audioBG = document.getElementById("bgMusic");
const audioSong = document.getElementById("ourSong");
const audioWrite = document.getElementById("writeSound");
let firstInteractionDone = false;

function enter(){
 const inputPass = document.getElementById("pass");
 const loginContainer = document.getElementById("login");
 if(inputPass && loginContainer){
  if(inputPass.value==="Jerry"){
   if(!firstInteractionDone){
    audioBG.play().catch(err => console.log("Audio de fondo bloqueado:", err));
    audioSong.load(); audioWrite.load();
    firstInteractionDone = true;
   }
   loginContainer.style.display="none";
  }
 }
}

function toggleSong(){
 if(audioSong.paused){
  audioBG.pause(); audioSong.currentTime=0; audioSong.play().catch(()=>{});
  document.getElementById("btnPlay").innerHTML="⏸️ Pausar";
 } else {
  audioSong.pause(); audioBG.play().catch(()=>{});
  document.getElementById("btnPlay").innerHTML="▶️ Reproducir";
 }
}

const frases=["Eres mi lugar favorito 🤎","Contigo todo es mejor 💞","Mi coincidencia más bonita ✨","Tu sonrisa es mi paz"];
document.addEventListener("click",e=>{
 if(e.target.tagName==="BUTTON"||e.target.tagName==="INPUT") return;
 if (!firstInteractionDone) { audioBG.play().catch(() => {}); firstInteractionDone = true; }
 const f=document.createElement("div"); f.className="tapPhrase";
 f.innerText=frases[Math.floor(Math.random()*frases.length)];
 f.style.left=e.clientX+"px"; f.style.top=e.clientY+"px";
 document.body.appendChild(f); setTimeout(()=>f.remove(),2000);
});

document.querySelectorAll("#gallery img").forEach(img=>{
 img.onclick=()=>{ zoom.style.display="flex"; zoomImg.src=img.src; }
});

const bgHeartsContainer = document.getElementById("bgHearts");
if(bgHeartsContainer){
 for(let i=0;i<25;i++){
  const s=document.createElement("span"); s.innerHTML="❤";
  s.style.left=Math.random()*100+"vw"; s.style.fontSize=(16+Math.random()*26)+"px";
  s.style.animationDuration=(8+Math.random()*10)+"s"; bgHeartsContainer.appendChild(s);
 }
}

const start = new Date(2024, 8, 11, 0, 0, 0);
function updateCounter(){
 const now = new Date(); const diff = now - start;
 const days = Math.floor(diff / (1000*60*60*24));
 const hours = Math.floor((diff / (1000*60*60)) % 24);
 const minutes = Math.floor((diff / (1000*60)) % 60);
 const seconds = Math.floor((diff / 1000) % 60);
 const counterEl = document.getElementById("counter");
 if(counterEl){
  counterEl.innerHTML = `<h3 style="margin:0;font-size:28px;animation:pulseCounter 1s infinite alternate;">${days} días 💗</h3>${hours} horas ${minutes} minutes ${seconds} segundos`;
 }
}
updateCounter(); setInterval(updateCounter,1000);

const poemaTexto="Cuando me enamoré de ti\n\n\"Cuando me enamoré de ti, entendí que no era que todas aquellas personas que me hablaron del amor estuvieran mal, sino que nunca me hablaron de ti.\n\nTe prometo\n\n\"Si te apagas, te prometo amarte con más fuerza.\nPrometo devolverte la luz que te caracteriza,\nregar tu jardín con el amor que me brindaste cuando estaba marchito.\nTe prometo cuidarte cuando enfermes\ny hacer lo que haga falta para asegurarme de que vuelvas a florecer.\n\nPorque, mi amor, si hay algo que le pido a Dios es que,\nsi alguna vez llega a ser necesario,\nme permita ser aquello que te haga falta,\ncomo tú lo fuiste conmigo.\"";

function typeText(t, el){
 el.textContent=""; const chars=[...t]; let i=0;
 function w(){ if(i<chars.length){ el.textContent+=chars[i++]; setTimeout(w,28); } }
 w();
}
const poemaEl = document.getElementById("poema");
if(poemaEl) { setTimeout(()=>typeText(poemaTexto,poemaEl),1200); }

function openLetter(){
 audioWrite.play().catch(()=>{});
 const txt="Esta carta es para ti.\nTe amo mi cebollín 🤎\nEspero compartir más cosas juntos 🥰🧸";
 const letterEl = document.getElementById("letter"); const signEl = document.getElementById("sign");
 if(letterEl && signEl){ letterEl.style.display="block"; typeText(txt,letterEl); setTimeout(()=>signEl.style.opacity=1,4200); }
}

function createAquariumEffects(){
 const aquarium = document.getElementById("aquarium"); if(!aquarium) return;
 setInterval(()=>{
  const bubble = document.createElement("div"); bubble.className = "aqua-bubble";
  const size = 4 + Math.random() * 14; bubble.style.width = size + "px"; bubble.style.height = size + "px";
  bubble.style.left = (Math.random() * 94 + 3) + "%"; bubble.style.bottom = "40px";
  bubble.style.animationDuration = (5 + Math.random() * 5) + "s"; aquarium.appendChild(bubble);
  setTimeout(()=>{ if(bubble.parentNode) bubble.remove(); }, 10000);
 }, 600);
 setInterval(()=>{
  const particle = document.createElement("div"); particle.className = "aqua-particle";
  particle.style.left = (Math.random() * 96 + 2) + "%"; particle.style.bottom = (Math.random() * 180 + 50) + "px";
  particle.style.animationDuration = (8 + Math.random() * 6) + "s"; aquarium.appendChild(particle);
  setTimeout(()=>{ if(particle.parentNode) particle.remove(); }, 15000);
 }, 1500);
}
setTimeout(createAquariumEffects, 700);

// Cerebro Autónomo de Canelito Premium
function initCanelitoBrain() {
  const container = document.getElementById("canelitoObj"); const body = document.getElementById("canelitoBody");
  const shadow = document.getElementById("canelitoShadow"); const garden = document.getElementById("canelitoGarden");
  if (!container || !body || !shadow || !garden) return;
  let posX = 50; let direction = 1; let currentStatus = "walk"; let speed = 1.8;

  setInterval(() => {
    const randomDice = Math.random();
    if (randomDice < 0.50) {
      currentStatus = "walk"; speed = 1.6 + Math.random() * 0.8; body.className = "canelito-body anim-walk";
    } else if (randomDice < 0.80) {
      currentStatus = "sit"; speed = 0; body.className = "canelito-body anim-sit";
    } else {
      currentStatus = "zoomies"; speed = 4.2; body.className = "canelito-body anim-zoomies";
    }
  }, 4000);

  function updatePhysics() {
    const gardenWidth = garden.clientWidth - 90;
    if (currentStatus !== "sit") {
      posX += speed * direction;
      if (posX >= gardenWidth) { posX = gardenWidth; direction = -1; }
      else if (posX <= 10) { posX = 10; direction = 1; }
      container.style.left = posX + "px"; container.style.transform = direction === 1 ? "scaleX(1)" : "scaleX(-1)";
    } else { container.style.transform = "scaleX(1)"; }

    const transformMatrix = window.getComputedStyle(body).transform;
    if (transformMatrix && transformMatrix !== "none") {
      const values = transformMatrix.split('(')[1].split(')')[0].split(',');
      const translateY = parseFloat(values[5]) || 0;
      if (translateY < 0) {
        const ratio = Math.min(Math.abs(translateY) / 25, 1);
        shadow.style.transform = `scale(${1 - ratio * 0.35})`; shadow.style.opacity = 1 - ratio * 0.5;
      } else { shadow.style.transform = "scale(1)"; shadow.style.opacity = "1"; }
    }
    requestAnimationFrame(updatePhysics);
  }
  body.className = "canelito-body anim-walk"; requestAnimationFrame(updatePhysics);

  setInterval(() => {
    if (currentStatus === "sit") return;
    const particle = document.createElement("div"); particle.className = "trail-particle";
    const items = ["🐾", "✨", "🐾", "⭐"]; particle.innerText = items[Math.floor(Math.random() * items.length)];
    const rect = container.getBoundingClientRect(); const gardenRect = garden.getBoundingClientRect();
    particle.style.left = (rect.left - gardenRect.left + 25) + "px"; particle.style.bottom = "35px";
    particle.style.setProperty("--x-drift", (Math.random() * 40 - 20) + "px");
    garden.appendChild(particle); setTimeout(() => particle.remove(), 1200);
  }, 220);
}
document.addEventListener("DOMContentLoaded", initCanelitoBrain);
</script>

const start = new Date(2024, 8, 11, 0, 0, 0);
function updateCounter(){

 const days = Math.floor(diff / (1000*60*60*24));
 const hours = Math.floor((diff / (1000*60*60)) % 24);
 const minutes = Math.floor((diff / (1000*60)) % 60);
 const seconds = Math.floor((diff / 1000) % 60);
 const counterEl = document.getElementById("counter");
 if(counterEl){
  counterEl.innerHTML = `<h3 style="margin:0;font-size:28px;animation:pulseCounter 1s infinite alternate;">${days} días 💗</h3>${hours} horas ${minutes} minutos ${seconds} segundos`;
 }
}

/* --- CEREBRO CON FISICAS AVANZADAS PARA CANELITO --- */
let isJumping = false;

function canelitoTrick() {
  if (isJumping) return;
  isJumping = true;
  
  const body = document.getElementById("pupBody");
  const shadow = document.getElementById("pupShadow");
  const container = document.getElementById("canelitoObj");
  const garden = document.getElementById("canelitoGarden");
  if(!body || !shadow || !container || !garden) return;
  
  // 1. Ejecutar vuelta mortal
  body.className = "pup-body-wrapper pup-jump-active";
  
  // 2. Desplegar ladrido visual aleatorio
  const bark = document.createElement("div");
  bark.className = "canelito-bark";
  const barks = ["¡Guau! 🐾", "¡Arf! ❤️", "¡Yap! ✨"];
  bark.innerText = barks[Math.floor(Math.random() * barks.length)];
  container.appendChild(bark);
  setTimeout(() => bark.remove(), 600);
  
  // 3. Crear ráfaga de brillos mágicos por el salto
  for(let i=0; i<6; i++){
    setTimeout(() => {
      const p = document.createElement("div"); p.className = "trail-particle";
      p.innerText = ["✨", "💖", "🐾", "⭐"][Math.floor(Math.random()*4)];
      const rect = container.getBoundingClientRect(); const gRect = garden.getBoundingClientRect();
      p.style.left = (rect.left - gRect.left + 30 + (Math.random()*16 - 8)) + "px";
      p.style.bottom = "40px"; p.style.setProperty("--x-drift", (Math.random() * 60 - 30) + "px");
      garden.appendChild(p); setTimeout(() => p.remove(), 1100);
    }, i * 70);
  }
  
  // 4. Resetear animaciones normales tras caer
  setTimeout(() => {
    body.className = "pup-body-wrapper";
    isJumping = false;
  }, 750);
}

function startPuppyPatrol() {
  const container = document.getElementById("canelitoObj");
  const body = document.getElementById("pupBody");
  const shadow = document.getElementById("pupShadow");
  const garden = document.getElementById("canelitoGarden");
  if (!container || !body || !shadow || !garden) return;
  
  let pos = 40; let dir = 1;
  
  // Ciclo constante para mover y alterar la sombra dinámica según la altura del salto
  setInterval(() => {
    const gardenWidth = garden.clientWidth - 95;
    
    if (!isJumping) {
      pos += 1.8 * dir;
      if (pos >= gardenWidth) { dir = -1; container.style.transform = "scaleX(-1)"; }
      if (pos <= 10) { dir = 1; container.style.transform = "scaleX(1)"; }
      container.style.left = pos + "px";
      
      shadow.style.transform = "scale(1)"; shadow.style.opacity = "1";
    } else {
      // Si está saltando, calcular la altura en tiempo real para encoger la sombra
      const matrix = window.getComputedStyle(body).transform;
      if (matrix && matrix !== "none") {
        const values = matrix.split('(')[1].split(')')[0].split(',');
        const translateY = parseFloat(values[5]) || 0;
        if (translateY < 0) {
          const ratio = Math.min(Math.abs(translateY) / 125, 1);
          shadow.style.transform = `scale(${1 - ratio * 0.55})`;
          shadow.style.opacity = 1 - ratio * 0.65;
        }
      }
    }
  }, 30);

  // Rastro constante de huellitas tiernas mientras camina
  setInterval(() => {
    if (isJumping) return;
    const particle = document.createElement("div"); particle.className = "trail-particle";
    particle.innerText = Math.random() < 0.65 ? "🐾" : "✨";
    const rect = container.getBoundingClientRect(); const gRect = garden.getBoundingClientRect();
    particle.style.left = (rect.left - gRect.left + 25) + "px"; particle.style.bottom = "24px";
    particle.style.setProperty("--x-drift", (Math.random() * 20 - 10) + "px");
    garden.appendChild(particle); setTimeout(() => particle.remove(), 1000);
  }, 250);
}
document.addEventListener("DOMContentLoaded", startPuppyPatrol);
