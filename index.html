<style>
/* --- CONFIGURACIÓN BASE Y FONDO --- */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(180deg, #140010 0%, #2a0030 100%) !important; /* Forzado para que no se vuelva negro */
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}

/* --- PANTALLA DE CONTRASEÑA --- */
#login {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #140010 0%, #2a0030 100%) !important; /* Mismo fondo morado hermoso */
  z-index: 99999;
  overflow: hidden;
}
.loginCard {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  padding: 40px 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255, 0, 120, 0.4);
  animation: float 4s ease-in-out infinite;
  z-index: 10; /* Por encima de la lluvia */
  width: 90%;
  max-width: 340px;
}
.loginCard h2 {
  color: #fff;
  margin-top: 0;
  font-size: 22px;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
#pass {
  padding: 14px;
  border-radius: 14px;
  border: 2px solid #ff80bf;
  text-align: center;
  font-size: 16px;
  width: 100%;
  color: #000;
  background: #fff;
  margin-bottom: 15px;
}
#login button {
  padding: 12px 24px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff4da6, #ff80bf);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: .25s;
  width: 100%;
}
#login button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #ff80bf;
}

/* --- LLUVIA DE CORAZONES ROSADOS GLOBAL (FIJA EN EL FONDO) --- */
.bgHearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1; /* Visible en login y detrás de las tarjetas al entrar */
  overflow: hidden;
}
.bgHearts span {
  position: absolute;
  color: #ff4da6; /* Rosado intenso */
  text-shadow: 0 0 5px rgba(255, 77, 166, 0.6);
  animation: rise linear infinite;
  bottom: -50px;
}
@keyframes rise {
  from { transform: translateY(0); opacity: 0.8; }
  to { transform: translateY(-110vh); opacity: 0; }
}
</style>
<style>
/* --- TARJETAS CONTENEDORAS BLANCAS --- */
.card {

.card h2 {
  margin-top: 0;

}

/* --- ELEMENTOS MULTIMEDIA --- */
.circleImg, .musicCover {
  width: 170px;
  height: 170px;
  border-radius: 50%;

  margin: 14px auto;
  border: 6px solid #ffb3d9;
}
#counter {
  font-size: 16px;
  line-height: 1.4;
}
.card button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff4da6, #ff80bf);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: .25s;
}
.card button:hover {
  transform: scale(1.06);
}

/* --- ARREGLO DE FOTOS PARA QUE SE VEAN PERFECTAS --- */
.carousel {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 10px;
  scroll-behavior: smooth;
}
.carousel img {
  width: 180px;
  height: 140px;
  object-fit: cover;
  border-radius: 16px;
  flex-shrink: 0;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.grid img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.2s;
}
.grid img:hover {
  transform: scale(1.03);
}

/* --- EFECTOS EXTRAS --- */
#zoom {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999999;
}
#zoom img {
  max-width: 92%;
  max-height: 85%;
  border-radius: 18px;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}
.typewriter {
  white-space: pre-wrap;
  border-right: 2px solid #ff4da6;
  animation: blink .8s infinite;
  text-align: left;
  font-size: 15px;
  line-height: 1.5;
}
@keyframes blink { 50% { border-color: transparent; } }
.secretLetter {
  margin-top: 15px;
  padding: 20px;
  border-radius: 18px;
  background: linear-gradient(45deg, #ffe0f0, #ffd1ea);
  display: none;
  white-space: pre-wrap;
  text-align: left;
  font-size: 15px;
  color: #4a0030;
}
.seal { font-size: 45px; cursor: pointer; animation: pulse 1.5s infinite; display: inline-block; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.signature { font-family: cursive; font-size: 20px; margin-top: 15px; opacity: 0; transition: opacity 1s; color: #ff4da6; }
.tapPhrase { position: fixed; color: #ffd6eb; font-size: 16px; font-weight: bold; animation: floatUp 2s forwards; pointer-events: none; z-index: 9999; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
@keyframes floatUp { to { transform: translateY(-70px); opacity: 0; } }

.aquarium {

@keyframes swimAround {

.jellyfish { position: absolute; font-size: 26px; animation: swimJelly 18s ease-in-out infinite; left: 50%; top: 30%; z-index: 14; }

<script>
// --- CONTROL DE INGRESO Y CONTRASEÑA ---
const audioBG = document.getElementById("bgMusic");
const audioSong = document.getElementById("ourSong");
const audioWrite = document.getElementById("writeSound");
let firstInteractionDone = false;

function enter(){
  const inputPass = document.getElementById("pass");
  const loginContainer = document.getElementById("login");
  if(inputPass && loginContainer){
    if(inputPass.value === "Jerry"){
      if(!firstInteractionDone){
        audioBG.play().catch(err => console.log("Audio diferido:", err));
        audioSong.load(); audioWrite.load();
        firstInteractionDone = true;
      }
      loginContainer.style.display = "none";
    } else {
      alert("Contraseña incorrecta ❌");
    }
  }
}

// --- REPRODUCTOR DE MÚSICA ---
function toggleSong(){
  if(audioSong.paused){
    audioBG.pause(); 
    audioSong.currentTime = 0; 
    audioSong.play().catch(()=>{});
    document.getElementById("btnPlay").innerHTML = "⏸️ Pausar";
  } else {
    audioSong.pause();

}

// --- CONTADOR ORIGINAL DE TIEMPO REAL ---
const start = new Date(2024, 8, 11, 0, 0, 0); 
function updateCounter(){
  const now = new Date(); 
  const diff = now - start;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);
  const counterEl = document.getElementById("counter");
  if(counterEl){
    counterEl.innerHTML = `<h3 style="margin:0 0 5px 0; font-size:26px; color:#ff4da6;">${days} días 💗</h3><span style="font-size:14px; color:#555;">${hours} horas ${minutes} minutos ${seconds} segundos</span>`;
  }
}
updateCounter(); 
setInterval(updateCounter, 1000);

// --- ESCRITURA AUTOMÁTICA DE POEMAS ---
const poemaTexto = "Cuando me enamoré de ti\n\n\"Cuando me enamoré de ti, entendí que no era que todas aquellas personas que me hablaron del amor estuvieran mal, sino que nunca me hablaron de ti.\"\n\nTe prometo\n\n\"Si te apagas, te prometo amarte con más fuerza.\nPrometo devolverte la luz que te caracteriza,\nregar tu jardín con el amor que me brindaste cuando estaba marchito.\nTe prometo cuidarte cuando enfermes\ny hacer lo que haga falta para asegurarme de que vuelvas a florecer.\n\nPorque, mi amor, si hay algo que le pido a Dios es que,\nsi alguna vez llega a ser necesario,\nme permita ser aquello que te haga falta,\ncomo tú lo fuiste conmigo.\"";

function typeText(t, el, callback){
  el.textContent = ""; 
  const chars = [...t]; 
  let i = 0;
  function w(){ 
    if(i < chars.length){ 
      el.textContent += chars[i++]; 
      setTimeout(w, 20); 
    } else if (callback) {
      callback();
    }
  }
  w();
}
const poemaEl = document.getElementById("poema");
if(poemaEl) { setTimeout(() => typeText(poemaTexto, poemaEl), 1500); }

// --- MOVIMIENTO DE CANELITO ---
let canelitoJumping = false;

function canelitoTrick() {
  if (canelitoJumping) return;
  canelitoJumping = true;
  const body = document.getElementById("pupBody");
  const container = document.getElementById("canelitoObj");
  if(!body || !container) return;
  body.className = "pup-body-wrapper pup-jump-active";
  
  const bark = document.createElement("div");
  bark.className = "canelito-bark";
  bark.innerText = ["¡Guau! 🐾", "¡Arf! ❤️", "¡Yap! ✨"][Math.floor(Math.random() * 3)];
  container.appendChild(bark);
  setTimeout(() => bark.remove(), 500);
  
  setTimeout(() => {
    body.className = "pup-body-wrapper";
    canelitoJumping = false;
  }, 750);
}

function startCanelitoPatrol() {
  const container = document.getElementById("canelitoObj");
  const garden = document.getElementById("canelitoGarden");
  if (!container || !garden) return;
  let pos = 30; let dir = 1;
  
  setInterval(() => {
    if (canelitoJumping) return;
    const maxW = garden.clientWidth - 90;
    pos += 1.6 * dir;
    if (pos >= maxW) { dir = -1; container.style.transform = "scaleX(-1)"; }
    if (pos <= 10) { dir = 1; container.style.transform = "scaleX(1)"; }
    container.style.left = pos + "px";
  }, 35);

  setInterval(() => {
    if (canelitoJumping) return;
    const p = document.createElement("div"); 
    p.className = "trail-particle";
    p.innerText = "🐾";
    const gRect = garden.getBoundingClientRect(); const cRect = container.getBoundingClientRect();
    p.style.left = (cRect.left - gRect.left + 22) + "px"; p.style.bottom = "20px";
    garden.appendChild(p); setTimeout(() => p.remove(), 900);
  }, 350);
}
setTimeout(startCanelitoPatrol, 1000);
